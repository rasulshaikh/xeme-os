name: ci

# Runs on every push and PR to main.
# - go vet (catch bugs)
# - go build (compile all binaries)
# - go test (run unit tests)
# - gofmt check (style)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: download modules
        run: go mod download

      - name: gofmt
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "Files not gofmt'd:"
            gofmt -l .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build all binaries
        run: |
          mkdir -p dist
          for cmd in xeme xeme-os xeme-mcp xeme-campaigns xeme-ledger-server xeme-workflows; do
            case "$cmd" in
              xeme) dir="xeme" ;;
              xeme-os) dir="xeme-os" ;;
              xeme-mcp) dir="xeme-mcp" ;;
              xeme-campaigns) dir="xeme-campaigns" ;;
              xeme-ledger-server) dir="xeme-ledger" ;;
              xeme-workflows) dir="xeme-workflows" ;;
            esac
            go build -o "dist/$cmd" "./cmd/$dir"
          done
          echo "✓ Built all binaries:"
          ls -lh dist/

      - name: go test
        run: go test -v -count=1 ./... | tail -50
